services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: software_inventory
      MARIADB_USER: web1_user
      MARIADB_PASSWORD: web1_docker_password
      MARIADB_ROOT_PASSWORD: root_docker_password
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_hungarian_ci
    volumes:
      - docker-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot_docker_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: software_inventory
      DB_USER: web1_user
      DB_PASSWORD: web1_docker_password
      DB_TABLE: software_items
      PORTAL_CHECKER_FAMILY_NAME: ""
      PORTAL_CHECKER_GIVEN_NAME: ""
      PORTAL_CHECKER_LOGIN: ""
      PORTAL_CHECKER_PASSWORD: ""
    ports:
      - "3210:80"
    volumes:
      - docker-uploads:/var/www/html/backend/public/uploads

volumes:
  docker-db-data:
  docker-uploads:
